name: Energy Schema
version: "0.5.3"
slug: energy_schema
description: Живая однолинейная схема энергосистемы BobRIXOS (Go renderer)
url: https://github.com/Sergii-Kirichok/ha-energy-schema
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:home-lightning-bolt
panel_title: Энергосхема
homeassistant_api: true
hassio_api: true
map:
  - homeassistant_config:rw
options:
  refresh_seconds: 3
  ha_url: "http://homeassistant:8123"
  ha_token: ""
  title: "Энергосистема"
  in1_name: "Рыбхоз"
  in2_name: "Зелёный"
  pv1_label: "Поле 1"
  pv2_label: "Поле 2"
  pv3_label: "Поле 3"
  batt_capacity_kwh: 60
  home_max: 30
  home_t1: 3
  home_t2: 5
  home_t3: 25
  pv_max: 33
  pv_t1: 5
  pv_t2: 20
  pv_t3: 25
  pv_day_clear_kwh: 100
  control_users: []
  pv_ac_limit_kw: 33
  pv_strings:
    - name: "Поле 1"
      field: "Поле 1"
      kwp: 6.45
      tilt: 51
      azimuth: 122
      bifacial: 0.12
      controllable: false
    - name: "Забор"
      field: "Забор"
      kwp: 7.44
      tilt: 90
      azimuth: 76
      bifacial: 0
      controllable: false
schema:
  refresh_seconds: int(1,60)
  ha_url: str
  ha_token: str?
  title: str?
  in1_name: str?
  in2_name: str?
  pv1_label: str?
  pv2_label: str?
  pv3_label: str?
  batt_capacity_kwh: float?
  home_max: float?
  home_t1: float?
  home_t2: float?
  home_t3: float?
  pv_max: float?
  pv_t1: float?
  pv_t2: float?
  pv_t3: float?
  pv_day_clear_kwh: float?
  pv_ac_limit_kw: float?
  control_users:
    - str?
  pv_strings:
    - name: str
      field: str?
      kwp: float
      tilt: float
      azimuth: float
      bifacial: float?
      controllable: bool?
