name: Energy Schema
version: "0.4.48"
slug: energy_schema
description: Живая однолинейная схема энергосистемы BobRIXOS (Go renderer)
url: https://github.com/Sergii-Kirichok/ha-energy-schema
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_port: 8099
homeassistant_api: true
hassio_api: true
map:
  - homeassistant_config:rw
options:
  refresh_seconds: 3
  ha_url: "http://homeassistant:8123"
  ha_token: ""
  title: "Энергосистема"
  in1_name: "Рыбхоз"
  in2_name: "Зелёный"
  pv1_label: "Поле 1"
  pv2_label: "Поле 2"
  pv3_label: "Поле 3"
  batt_capacity_kwh: 60
  home_max: 30
  home_t1: 3
  home_t2: 5
  home_t3: 25
  pv_max: 33
  pv_t1: 5
  pv_t2: 20
  pv_t3: 25
  pv_day_clear_kwh: 100
schema:
  refresh_seconds: int(1,60)
  ha_url: str
  ha_token: str?
  title: str?
  in1_name: str?
  in2_name: str?
  pv1_label: str?
  pv2_label: str?
  pv3_label: str?
  batt_capacity_kwh: float?
  home_max: float?
  home_t1: float?
  home_t2: float?
  home_t3: float?
  pv_max: float?
  pv_t1: float?
  pv_t2: float?
  pv_t3: float?
  pv_day_clear_kwh: float?
